name: Daily Radar

on:
  schedule:
    - cron: "0 6 * * *" # every day at 06:00 UTC
  workflow_dispatch: {} # allow manual runs
  push:
    branches: [main]
    paths:
      - "web/**"
      - "pipeline/**"
      - ".github/workflows/daily.yml"

permissions:
  contents: write # to commit updated data
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- 1. run the zero-LLM pipeline ----------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pipeline deps
        run: pip install -r requirements.txt
      - name: Run pipeline
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          cd pipeline
          python main.py

      - name: Commit updated data
        run: |
          git config user.name "perks-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ README.md
          git commit -m "data: daily refresh $(date -u +%F)" || echo "no changes"
          git push || echo "nothing to push"

      # ---------- 2. build the Next.js static site ----------
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Copy data into site
        run: cp data/perks.json web/public/perks.json
      - name: Install & build
        env:
          # repo name = basePath for project Pages site
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          cd web
          npm ci
          npm run build
          touch out/.nojekyll

      # ---------- 3. deploy to GitHub Pages ----------
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out
      - uses: actions/deploy-pages@v4
